apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: announcement-app
  namespace: w8-day-2
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: announcement-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: announcement-app
    spec:
      containers:
        - name: web
          image: w8-announcement-app:0.1.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: announcement-app-config
            - secretRef:
                name: announcement-app-secret
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
  strategy:
    canary:
      steps:
        - setWeight: 20
        - pause:
            duration: 60s
        - analysis:
            templates:
              - templateName: announcement-success-rate
            args:
              - name: service-name
                value: announcement-app
        - setWeight: 50
        - pause:
            duration: 60s
        - setWeight: 100
