apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: w9-observability
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/MinhKhoa2209/minhkhoa-aws-accelerator-p2.git
    targetRevision: HEAD
    path: cloud/w9/lab/observability
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
