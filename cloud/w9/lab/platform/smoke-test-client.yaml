apiVersion: v1
kind: Pod
metadata:
  name: smoke-test-client
  labels:
    app.kubernetes.io/name: smoke-test-client
    owner: platform-team
    cost-center: training
    environment: lab
spec:
  restartPolicy: Always
  containers:
    - name: client
      image: busybox:1.36
      command:
        - sh
        - -c
        - sleep 3600
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 50m
          memory: 64Mi
