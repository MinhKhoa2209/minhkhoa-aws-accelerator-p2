apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: announcement-app-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: announcement-app
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8080
