apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: announcement-success-rate
  namespace: w8-day-2
spec:
  args:
    - name: service-name
      value: announcement-app
  metrics:
    - name: success-rate
      interval: 1m
      count: 3
      failureLimit: 1
      successCondition: result[0] >= 0.99
      provider:
        prometheus:
          address: http://prometheus-operated.observability.svc.cluster.local:9090
          query: |
            sum(rate(http_server_requests_total{service_name="{{args.service-name}}",status_code=~"2.."}[1m]))
            /
            sum(rate(http_server_requests_total{service_name="{{args.service-name}}"}[1m]))
