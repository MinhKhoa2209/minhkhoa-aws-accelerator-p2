apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - resource-quota.yaml
  - limit-range.yaml
  - poddisruptionbudget.yaml
  - required-cost-labels-policy.yaml
  - required-cost-labels-binding.yaml
  - deny-loadbalancer-policy.yaml
  - deny-loadbalancer-binding.yaml

labels:
  - pairs:
      app.kubernetes.io/managed-by: argocd
      app.kubernetes.io/part-of: w10-secure-operate
      app.kubernetes.io/component: cost-guard
    includeSelectors: false
    includeTemplates: true
