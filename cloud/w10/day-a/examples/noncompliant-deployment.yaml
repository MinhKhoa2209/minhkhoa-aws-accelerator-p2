apiVersion: apps/v1
kind: Deployment
metadata:
  name: owner-label-missing
  namespace: w10-rbac-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: owner-label-missing
  template:
    metadata:
      labels:
        app: owner-label-missing
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
