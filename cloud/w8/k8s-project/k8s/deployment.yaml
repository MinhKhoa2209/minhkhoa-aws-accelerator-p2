apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-project-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-project-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-project-web
    spec:
      containers:
        - name: web
          image: k8s-project-next:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
