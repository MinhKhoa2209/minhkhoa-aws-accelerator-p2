name: trivy-cosign

on:
  pull_request:
    paths:
      - "cloud/w8/day-2/**"
      - "cloud/w10/day-b/**"
  push:
    branches:
      - main
    paths:
      - "cloud/w8/day-2/**"
      - "cloud/w10/day-b/**"

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

env:
  IMAGE_NAME: ghcr.io/minhkhoa2209/minhkhoa-aws-accelerator-p2/w8-announcement-app
  IMAGE_TAG: ${{ github.sha }}

jobs:
  scan-build-sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.3.1

      - name: Trivy filesystem scan
        run: trivy fs --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 cloud/w8/day-2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: cloud/w8/day-2/app
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Trivy image scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --format sarif \
            --output trivy-results.sarif \
            "${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: github.event_name == 'push'
        run: docker push "${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Install Cosign
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@v3.8.1

      - name: Sign image with Cosign keyless
        if: github.event_name == 'push'
        run: cosign sign --yes "${IMAGE_NAME}:${IMAGE_TAG}"
